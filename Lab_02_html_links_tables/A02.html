<!DOCTYPE html>
<html>
    <style>
        table,th,td {
            border: 1px solid black;
        }
    </style>
    <head>
        <title>Table in HTML</title>
    </head>
    <body>
        <h2>A Basic HTML table</h2>
        <table style="width: 100%;">
            <tr>
                <th>Company</th>
                <th>Contact</th>
                <th>Country</th>
            </tr>
            <tr>
                <td>Alfreds Futterkiste</td>
                <td>Maria Ander</td>
                <td>Germany</td>
            </tr>
            <tr>
                <td>Centro comercial Moctezuma</td>
                <td>Francisco chang</td>
                <td>Mexico</td>
            </tr>
        </table>
    </body>
</html>
